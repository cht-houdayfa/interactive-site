<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevOps Test Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
      font-family: Arial, sans-serif;
      color: #ffffff;
    }

    .card {
      background: rgba(0,0,0,0.55);
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      max-width: 600px;
      width: 90%;
    }

    h1 {
      margin-top: 0;
    }

    a {
      display: block;
      margin: 15px 0;
      padding: 12px;
      border-radius: 8px;
      background: #00bcd4;
      color: #000;
      font-weight: bold;
      text-decoration: none;
    }

    a:hover {
      background: #00e5ff;
    }

    footer {
      margin-top: 20px;
      font-size: 0.85rem;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🚀 DevOps Test Dashboard</h1>

    <p>If you can see this card, Nginx is working correctly.</p>

    <a href="/">🏠 Default Website</a>
    <a href="/educconnect/">📚 EducConnect Application</a>

    <footer>
      Jenkins • Nginx • CI/CD Test
    </footer>
  </div>
</body>
</html>
